<!doctype html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>ПроКомьюнити</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.heat/0.2.0/leaflet-heat.js"></script>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  :root{
    --ink:#111725; --muted:#6B7280; --line:#E6E9F0; --bg:#EDF0F5; --surface:#FFFFFF;
    --navy:#192A43; --navy-2:#33465C; --navy-soft:#E7ECF3;
    --amber:#FF9F1C; --amber-soft:#FFF1DC; --green:#12B886; --green-soft:#E4F7EF;
    --shadow:0 14px 36px rgba(15,22,38,.14); --card-sh:0 2px 10px rgba(20,30,55,.05);
    --display:"Space Grotesk",-apple-system,Segoe UI,Roboto,sans-serif;
    --data:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0; height:100%; overflow:hidden; overscroll-behavior:none}
  body{font-family:var(--sans); color:var(--ink); background:#D7DBE6; -webkit-font-smoothing:antialiased;
    display:flex; justify-content:center; position:fixed; inset:0; overflow:hidden}
  .app{width:100%; max-width:430px; background:var(--bg); height:100vh; height:100dvh; position:relative; display:flex; flex-direction:column; overflow:hidden}
  @media(min-width:520px){ body{align-items:center; padding:24px 0} .app{height:min(884px,96vh); border-radius:32px; box-shadow:var(--shadow)} }
  .rolebar{background:var(--navy); color:#fff; padding:12px 14px 12px; flex:0 0 auto}
  .brandrow{display:flex; justify-content:center; margin-bottom:11px}
  .brandrow img{height:50px; display:block; border-radius:8px}
  .rolebar .lbl{font-size:11px; letter-spacing:.08em; text-transform:uppercase; color:#93A0B4; font-family:var(--data)}
  .seg{display:flex; gap:4px; margin-top:7px; background:#22303f; padding:4px; border-radius:12px}
  .seg button{flex:1; border:0; background:transparent; color:#AEB6C2; font-weight:600; font-size:13px; padding:8px 0; border-radius:9px; cursor:pointer; font-family:var(--sans); transition:.15s}
  .seg button.on{background:#fff; color:var(--navy)}
  .seg button:active{transform:scale(.97)}
  .seg button:focus-visible{outline:2px solid var(--amber); outline-offset:2px}
  .screen{flex:1 1 auto; min-height:0; overflow-y:auto; -webkit-overflow-scrolling:touch; overscroll-behavior:contain; padding:16px 16px 20px}
  .screen::-webkit-scrollbar{width:0}
  h1.brand{font-family:var(--display); font-size:22px; font-weight:700; margin:2px 0 2px; letter-spacing:-.02em; color:var(--navy)}
  .sub{color:var(--muted); font-size:13px; margin:0 0 14px}
  .card{background:var(--surface); border-radius:20px; padding:16px; box-shadow:var(--card-sh); margin-bottom:12px}
  .card.tight{padding:14px}
  .loader{display:grid; place-items:center; height:60vh; color:var(--muted)}
  .spin{width:34px; height:34px; border:3px solid var(--navy-soft); border-top-color:var(--navy); border-radius:50%; animation:sp 1s linear infinite}
  @keyframes sp{to{transform:rotate(360deg)}}
  /* hero ring */
  .hero{background:radial-gradient(120% 90% at 80% -10%, #3A5074 0%, #192A43 55%); color:#fff; border-radius:24px; padding:22px 20px 20px; margin-bottom:14px; position:relative; overflow:hidden}
  .hero .eyebrow{font-family:var(--data); font-size:11px; letter-spacing:.12em; text-transform:uppercase; opacity:.85}
  .hero .eyebrow{color:#FFC978}
  .ring{position:relative; width:210px; height:210px; margin:6px auto 4px}
  .ring svg{transform:rotate(-90deg)}
  .ring-bg{fill:none; stroke:rgba(255,255,255,.16); stroke-width:14}
  .ring-fg{fill:none; stroke:var(--amber); stroke-width:14; stroke-linecap:round; transition:stroke-dashoffset 1.1s cubic-bezier(.3,.8,.3,1)}
  .ring-center{position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center}
  .ring-center .rd{font-family:var(--display); font-weight:700; font-size:66px; line-height:1; letter-spacing:-.03em}
  .ring-center .rl{font-size:13px; opacity:.8; margin-top:2px; font-family:var(--data); letter-spacing:.05em}
  .herofoot{text-align:center; font-size:14px; opacity:.92; margin-top:6px}
  .mentor{display:flex; align-items:center; gap:12px}
  .ava{width:44px; height:44px; border-radius:14px; display:grid; place-items:center; color:#fff; font-weight:700; flex:0 0 auto; font-family:var(--display)}
  .mentor .n{font-weight:650; font-size:15px}
  .mentor .r{color:var(--muted); font-size:12.5px}
  .btn{border:0; border-radius:13px; padding:10px 14px; font-weight:650; font-size:14px; cursor:pointer; font-family:var(--sans); text-decoration:none; display:inline-block; text-align:center; transition:transform .1s}
  .btn:active{transform:scale(.97)}
  .btn.pri{background:var(--navy); color:#fff}
  .btn.ghost{background:var(--navy-soft); color:var(--navy)}
  .btn.block{width:100%; padding:13px}
  .btn:focus-visible{outline:2px solid var(--amber); outline-offset:2px}
  .cardhead{display:flex; align-items:center; justify-content:space-between; margin-bottom:12px}
  .cardhead h3{margin:0; font-size:15px}
  .pct{font-family:var(--display); font-size:15px; color:var(--amber); font-weight:700}
  .chk{display:flex; align-items:center; gap:12px; padding:11px 0; border-top:1px solid var(--line); cursor:pointer}
  .bar + .chk{border-top:0}
  .box{width:24px; height:24px; border-radius:8px; border:2px solid var(--line); flex:0 0 auto; display:grid; place-items:center; transition:.15s}
  .chk.on .box{background:var(--green); border-color:var(--green)}
  .box svg{opacity:0; transition:.15s}
  .chk.on .box svg{opacity:1}
  .chk .t{font-size:14.5px}
  .chk.on .t{color:var(--muted); text-decoration:line-through}
  .bar{height:9px; background:var(--line); border-radius:6px; overflow:hidden}
  .bar > i{display:block; height:100%; border-radius:6px; background:var(--amber); transition:width .8s cubic-bezier(.3,.8,.3,1)}
  .row{display:flex; align-items:center; gap:12px; padding:12px 0; border-top:1px solid var(--line)}
  .row:first-child{border-top:0}
  .row .grow{flex:1; min-width:0}
  .row .nm{font-weight:600; font-size:14.5px}
  .row .meta{color:var(--muted); font-size:12.5px; font-family:var(--data)}
  .status{font-size:11px; font-weight:700; padding:4px 9px; border-radius:20px; white-space:nowrap}
  .st-ok{background:var(--green-soft); color:#0B7A57}
  .st-risk{background:var(--amber-soft); color:#B4690E}
  .st-go{background:var(--navy-soft); color:var(--navy)}
  .mini-bar{height:6px; background:var(--line); border-radius:4px; overflow:hidden; margin-top:7px}
  .mini-bar > i{display:block; height:100%; background:var(--navy); transition:width .7s}
  .sig{padding:12px 0; border-top:1px solid var(--line)}
  .sig:first-child{border-top:0}
  .sig .p{font-weight:600; font-size:14.5px}
  .sig .d{color:var(--muted); font-size:12.5px; font-family:var(--data); margin-top:2px}
  .dotc{width:9px;height:9px;border-radius:50%;display:inline-block;margin-right:6px;vertical-align:middle}
  .tag{display:inline-block; font-size:11px; font-weight:700; padding:3px 8px; border-radius:6px; background:var(--navy-soft); color:var(--navy); font-family:var(--data)}
  .empty{color:var(--muted); font-size:13.5px; text-align:center; padding:22px 8px}
  #map{height:270px; border-radius:16px; overflow:hidden; margin-bottom:8px; z-index:0}
  .fallback{height:150px;border-radius:16px;background:var(--navy-soft);display:grid;place-items:center;color:var(--navy);font-size:13px;text-align:center;padding:20px;margin-bottom:8px}
  .legend{display:flex; gap:14px; justify-content:center; margin:0 0 12px; font-size:12px; color:var(--muted)}
  .legend span{display:inline-flex; align-items:center; gap:5px}
  .legend i{width:10px; height:10px; border-radius:50%; display:inline-block}
  .leaflet-container{font-family:var(--sans)}
  .kpi{background:radial-gradient(120% 100% at 15% 0%, #16C495 0%, #0E9F74 70%); color:#fff; border-radius:24px; padding:22px; margin-bottom:14px; position:relative; overflow:hidden}
  .kpi .num{font-family:var(--display); font-size:62px; font-weight:700; letter-spacing:-.03em; line-height:1}
  .kpi .cap{font-size:13.5px; opacity:.95; margin-top:4px; max-width:80%}
  .verdict{display:inline-flex; align-items:center; gap:6px; margin-top:14px; background:rgba(255,255,255,.2); padding:7px 12px; border-radius:20px; font-size:12.5px; font-weight:650}
  .cmp{margin:8px 0}
  .cmp .lg{display:flex; justify-content:space-between; font-size:13px; margin-bottom:5px}
  .cmp .lg b{font-family:var(--display)}
  .cmpbar{height:16px; border-radius:9px; background:var(--line); overflow:hidden}
  .cmpbar > i{display:block; height:100%; border-radius:9px; width:0; transition:width .9s cubic-bezier(.3,.8,.3,1)}
  .gapchip{display:inline-block; margin-top:2px; font-size:12px; font-weight:700; color:var(--green); font-family:var(--display)}
  .grid2{display:grid; grid-template-columns:1fr 1fr; gap:10px}
  .stat{background:var(--surface); border-radius:16px; padding:14px; box-shadow:var(--card-sh)}
  .stat .v{font-size:24px; font-weight:700; font-family:var(--display)}
  .stat .k{color:var(--muted); font-size:12px; margin-top:2px}
  .money{background:var(--navy); color:#fff; border-radius:18px; padding:16px; margin-top:12px}
  .money .v{font-size:27px; font-weight:700; font-family:var(--display); color:#fff}
  .money .k{font-size:12.5px; opacity:.82; margin-top:3px; line-height:1.45}
  .tabs{flex:0 0 auto; background:#fff; border-top:1px solid var(--line); display:flex; padding:8px 8px calc(8px + env(safe-area-inset-bottom)); z-index:5}
  .tabs button{flex:1; border:0; background:transparent; cursor:pointer; padding:6px 0; color:var(--muted); font-size:11px; font-weight:600; font-family:var(--sans)}
  .tabs button.on{color:var(--amber)}
  .tabs button:active{transform:scale(.94)}
  .tabs .ic{display:block; margin:0 auto 3px; width:22px; height:22px}
  .sheet{position:absolute; inset:0; background:rgba(15,22,38,.45); display:none; align-items:flex-end; z-index:60}
  .sheet.open{display:flex}
  .sheet .panel{background:#fff; width:100%; border-radius:24px 24px 0 0; padding:18px 16px calc(20px + env(safe-area-inset-bottom)); max-height:88%; overflow-y:auto; animation:up .25s ease}
  @keyframes up{from{transform:translateY(30px)}to{transform:none}}
  .grab{width:38px; height:4px; background:var(--line); border-radius:3px; margin:0 auto 14px}
  .toggle{display:flex; align-items:center; justify-content:space-between; padding:12px 0; border-top:1px solid var(--line)}
  .sw{width:46px; height:28px; border-radius:16px; background:var(--line); position:relative; cursor:pointer; transition:.18s; flex:0 0 auto}
  .sw.on{background:var(--green)}
  .sw::after{content:""; position:absolute; top:3px; left:3px; width:22px; height:22px; border-radius:50%; background:#fff; transition:.18s}
  .sw.on::after{left:21px}
  .addbtn{border:1.5px dashed var(--line); background:transparent; color:var(--navy); width:100%; padding:13px; border-radius:14px; font-weight:650; cursor:pointer; font-family:var(--sans)}
  .field{width:100%; border:1px solid var(--line); border-radius:12px; padding:12px; font-size:15px; font-family:var(--sans); margin-bottom:10px}
  .field:focus{outline:2px solid var(--navy-soft); border-color:var(--navy)}
  .note{font-size:12px; color:var(--muted); text-align:center; margin:8px 0 0}
  @media (prefers-reduced-motion: reduce){*{transition:none!important; animation:none!important}}

  .rolebar{position:relative}
  .fbbtn{position:absolute; top:12px; right:12px; width:34px; height:34px; border-radius:11px; border:0; background:#22303f; color:#fff; font-size:15px; cursor:pointer; z-index:2}
  .fbbtn:active{transform:scale(.95)}
  .stars{display:flex; gap:8px; justify-content:center; margin:4px 0 14px}
  .stars span{font-size:34px; cursor:pointer; color:var(--line); transition:.1s}
  .stars span.on{color:var(--amber)}
  .ta{width:100%; min-height:92px; border:1px solid var(--line); border-radius:12px; padding:12px; font-size:15px; font-family:var(--sans); resize:vertical; margin-bottom:10px}
  .ta:focus{outline:2px solid var(--navy-soft); border-color:var(--navy)}
  .fbitem{padding:11px 0; border-top:1px solid var(--line)}
  .fbitem:first-child{border-top:0}
  .fbitem .st{color:var(--amber); font-size:13px; letter-spacing:3px}
  .fbitem .tx{font-size:14px; margin-top:3px}
  .fbitem .wh{color:var(--muted); font-size:12px; font-family:var(--data); margin-top:2px}

  .langbtn{position:absolute; top:12px; left:12px; width:34px; height:34px; border-radius:11px; border:0; background:#22303f; color:#fff; font-size:15px; cursor:pointer; z-index:2}
  .langbtn:active{transform:scale(.95)}
  .demo-help{margin-inline-start:6px; border:0; background:#22303f; color:#AEB6C2; width:19px; height:19px; border-radius:50%; font-size:11px; font-weight:700; cursor:pointer; vertical-align:middle; line-height:1}
  .app[dir=rtl] .fbbtn{right:auto; left:12px}
  .app[dir=rtl] .langbtn{left:auto; right:12px}
  .app[dir=rtl] .heroline,.app[dir=rtl] .sub{ }
  .consent{position:absolute; inset:0; background:var(--navy); color:#fff; z-index:50; display:flex; flex-direction:column; padding:26px 22px calc(22px + env(safe-area-inset-bottom)); overflow-y:auto}
  .consent > img{height:60px; align-self:center; border-radius:12px; margin:8px 0 16px}
  .consent h2{font-family:var(--display); font-size:24px; margin:0 0 10px; text-align:center}
  .consent p{font-size:14.5px; line-height:1.55; color:#C9D2E0; margin:0 0 14px}
  .consent .lnk{color:var(--amber); font-weight:650; cursor:pointer; text-decoration:underline; font-size:14px; display:inline-block; margin-bottom:16px}
  .consent .agree{display:flex; align-items:center; gap:10px; margin-bottom:16px; cursor:pointer; font-size:14px}
  .consent .cb{width:24px;height:24px;border-radius:7px;border:2px solid #5A6B84;flex:0 0 auto;display:grid;place-items:center}
  .consent .agree.on .cb{background:var(--green); border-color:var(--green)}
  .consent .cb svg{opacity:0}
  .consent .agree.on .cb svg{opacity:1}
  .consent .btn{margin-top:auto}
  .consent .btn[disabled]{opacity:.45}
  .consent .langrow{display:flex; gap:8px; flex-wrap:wrap; justify-content:center; margin-bottom:16px}
  .consent .langrow button{border:1px solid #3A4A61; background:transparent; color:#C9D2E0; padding:6px 12px; border-radius:20px; font-size:13px; cursor:pointer}
  .consent .langrow button.on{background:#fff; color:var(--navy); border-color:#fff}
  .tourmask{position:absolute; inset:0; background:rgba(10,15,26,.62); z-index:30; display:none}
  .tourmask.on{display:block}
  .tour-glow{position:relative; z-index:31; box-shadow:0 0 0 3px var(--amber), 0 0 0 10px rgba(255,159,28,.35); border-radius:14px}
  .tourtip{position:absolute; left:16px; right:16px; bottom:80px; background:#fff; color:var(--ink); border-radius:18px; padding:16px; z-index:33; box-shadow:var(--shadow); display:none}
  .tourtip.on{display:block}
  .tourtip .tt{font-size:14.5px; line-height:1.5; margin-bottom:12px}
  .tourtip .row2{display:flex; justify-content:space-between; align-items:center}
  .tourtip .sk{border:0;background:transparent;color:var(--muted);font-size:13px;cursor:pointer}
  .tourtip .dots{display:flex; gap:5px}
  .tourtip .dots i{width:6px;height:6px;border-radius:50%;background:var(--line)}
  .tourtip .dots i.on{background:var(--navy)}

  /* ================= craft polish layer ================= */
  :root{
    --e1:0 1px 2px rgba(16,24,40,.05),0 1px 3px rgba(16,24,40,.05);
    --e2:0 2px 6px rgba(16,24,40,.05),0 8px 20px rgba(16,24,40,.08);
    --e3:0 14px 36px rgba(16,24,40,.14),0 3px 10px rgba(16,24,40,.06);
    --ease:cubic-bezier(.22,.61,.36,1); --spring:cubic-bezier(.34,1.42,.64,1);
  }
  body{ font-family:"Inter",var(--sans); letter-spacing:-.005em; }
  .app{ background:linear-gradient(180deg,#F5F7FB 0%,#EDF0F5 62%); }
  h1.brand{ letter-spacing:-.022em; }
  .sub{ line-height:1.5; }
  .screen{ padding:18px 16px 22px; }
  .card{ box-shadow:var(--e1); border:1px solid rgba(16,24,40,.055); border-radius:22px; }
  .stat{ box-shadow:var(--e1); border:1px solid rgba(16,24,40,.05); border-radius:18px; }
  .kpi{ box-shadow:var(--e2); } .money{ box-shadow:var(--e2); }
  .btn{ transition:transform .13s var(--spring), box-shadow .2s var(--ease), filter .2s; letter-spacing:-.01em; }
  .btn:active{ transform:translateY(1px) scale(.99); }
  .btn.pri{ background:linear-gradient(180deg,#233450,#192A43); box-shadow:0 1px 2px rgba(16,24,40,.24),0 6px 16px rgba(25,42,67,.20); }
  .btn.pri:active{ filter:brightness(1.06); }
  .btn.ghost{ box-shadow:inset 0 0 0 1px rgba(25,42,67,.06); }
  .addbtn{ transition:border-color .2s, background .2s, transform .13s var(--spring); }
  .addbtn:active{ transform:scale(.99); }
  .hero{ background:radial-gradient(130% 100% at 82% -12%, rgba(62,86,128,.35) 0%, transparent 55%), linear-gradient(150deg,#1B2E4A 0%,#14223A 100%); box-shadow:var(--e2); }
  .hero > *{ position:relative; z-index:1; }
  .hero::after{ content:""; position:absolute; width:210px; height:210px; left:50%; top:60px; transform:translateX(-50%); background:radial-gradient(circle, rgba(255,159,28,.22) 0%, transparent 62%); pointer-events:none; z-index:0; }
  .ring-fg{ filter:drop-shadow(0 0 5px rgba(255,159,28,.55)); }
  .ring-center .rd{ text-shadow:0 2px 14px rgba(0,0,0,.25); }
  .tabs button{ position:relative; transition:color .2s var(--ease); }
  .tabs button::before{ content:""; position:absolute; top:0; left:50%; transform:translateX(-50%) scaleX(0); transform-origin:center; width:24px; height:3px; border-radius:0 0 3px 3px; background:var(--amber); transition:transform .25s var(--spring); }
  .tabs button.on::before{ transform:translateX(-50%) scaleX(1); }
  .tabs .ic{ transition:transform .2s var(--ease); }
  .tabs button.on .ic{ transform:translateY(-1px); }
  .sheet{ -webkit-backdrop-filter:blur(3px); backdrop-filter:blur(3px); background:rgba(15,22,38,.42); }
  .sheet .panel{ border-radius:26px 26px 0 0; box-shadow:var(--e3); animation:sheetUp .38s var(--spring) both; }
  @keyframes sheetUp{ from{ transform:translateY(40px); opacity:.4 } to{ transform:none; opacity:1 } }
  .grab{ width:42px; height:5px; }
  .field,.ta{ border-radius:14px; transition:border-color .16s var(--ease), box-shadow .16s var(--ease); }
  .field:focus,.ta:focus{ border-color:var(--navy); box-shadow:0 0 0 3px rgba(59,76,214,.13); outline:none; }
  .sw{ transition:background .22s var(--ease); }
  .sw::after{ box-shadow:0 1px 3px rgba(16,24,40,.22); transition:left .24s var(--spring); }
  .chk .box{ transition:background .18s var(--ease), border-color .18s var(--ease), transform .18s var(--spring); }
  .chk.on .box{ transform:scale(1.06); }
  .status{ font-weight:650; letter-spacing:0; }
  .bar > i,.cmpbar > i,.mini-bar > i{ transition-timing-function:var(--ease); }
  .empty{ padding:30px 18px; line-height:1.5; }
  .empty::before{ content:""; display:block; width:44px; height:44px; margin:0 auto 14px; border-radius:14px; background:linear-gradient(180deg,var(--navy-soft),#DDE3EE); box-shadow:inset 0 0 0 1px rgba(25,42,67,.05); }
  .skel{ background:linear-gradient(100deg,#E7EBF3 28%,#F2F5FA 48%,#E7EBF3 68%); background-size:200% 100%; animation:shimmer 1.4s linear infinite; border-radius:16px; }
  @keyframes shimmer{ to{ background-position:-200% 0 } }
  .skhero{ height:210px; border-radius:24px; margin-bottom:14px; } .skcard{ height:66px; margin-bottom:12px; }
  .screen.nav-in{ animation:contentIn .3s var(--ease) both; }
  @keyframes contentIn{ from{ opacity:0 } to{ opacity:1 } }
  .fbbtn,.langbtn{ transition:transform .13s var(--spring), background .2s; }
  .fbbtn:active,.langbtn:active{ transform:scale(.92); }

  .demo-help{ width:20px; height:20px; font-size:12px; background:transparent; color:var(--amber); box-shadow:inset 0 0 0 1.5px rgba(255,159,28,.55); }
  .demo-help:active{ transform:scale(.9); }

  .onboard{ padding:8px 4px 24px; }
  .onboard .obhead{ text-align:center; margin:14px 0 20px; }
  .onboard h2{ font-family:var(--display); font-size:24px; margin:0 0 6px; letter-spacing:-.02em; }
  .onboard .obhead p{ color:var(--muted); font-size:14px; margin:0; }
  .rolecard{ width:100%; text-align:start; background:var(--surface); border:1px solid rgba(16,24,40,.06); border-radius:20px; padding:18px; margin-bottom:12px; cursor:pointer; box-shadow:var(--e1); display:flex; align-items:center; gap:14px; transition:transform .13s var(--spring), box-shadow .2s; font-family:var(--sans); }
  .rolecard:active{ transform:scale(.99); }
  .rolecard .ic2{ width:48px; height:48px; border-radius:15px; flex:0 0 auto; display:grid; place-items:center; font-size:24px; }
  .rolecard .rt{ font-weight:700; font-size:16px; color:var(--ink); }
  .rolecard .rs{ color:var(--muted); font-size:13px; }
  .citylist{ display:flex; flex-direction:column; gap:8px; }
  .cityitem{ width:100%; text-align:start; background:var(--surface); border:1px solid rgba(16,24,40,.06); border-radius:13px; padding:13px 15px; font-size:15px; font-weight:600; cursor:pointer; font-family:var(--sans); box-shadow:var(--e1); color:var(--ink); }
  .cityitem:active{ transform:scale(.99); }
  .orline{ text-align:center; color:var(--muted); font-size:12.5px; margin:16px 0 10px; }
  .prof-hero{ background:radial-gradient(120% 100% at 50% -10%, #33465C 0%, #192A43 60%); color:#fff; border-radius:22px; padding:22px; text-align:center; margin-bottom:14px; box-shadow:var(--e2); }
  .prof-hero .pav{ width:64px; height:64px; border-radius:20px; margin:0 auto 10px; display:grid; place-items:center; font-family:var(--display); font-weight:700; font-size:26px; background:var(--amber); color:#14223A; }
  .prof-hero .pn{ font-family:var(--display); font-weight:700; font-size:20px; }
  .prof-hero .prole{ font-size:13px; opacity:.85; margin-top:2px; font-family:var(--data); }
  .queue-take{ border:0; background:var(--indigo-soft); color:var(--navy); font-weight:650; font-size:13px; padding:8px 13px; border-radius:11px; cursor:pointer; white-space:nowrap; font-family:var(--sans); }
  .queue-take:active{ transform:scale(.95); }
  .gpsbar{ background:var(--amber-soft); color:#8a5a12; border-radius:12px; padding:10px 12px; font-size:12.5px; display:flex; align-items:center; justify-content:space-between; gap:10px; margin-bottom:12px; }
  .gpsbar button{ border:0; background:transparent; color:#8a5a12; font-weight:700; cursor:pointer; font-size:18px; line-height:1; }

  .mapwrap{ position:relative; }
  .livepill{ position:absolute; top:10px; right:10px; z-index:600; background:rgba(20,30,50,.8); color:#fff; font-size:11px; font-weight:600; padding:5px 11px 5px 9px; border-radius:20px; display:inline-flex; align-items:center; gap:6px; -webkit-backdrop-filter:blur(4px); backdrop-filter:blur(4px); font-family:var(--data); letter-spacing:.03em; }
  .livedot{ width:7px; height:7px; border-radius:50%; background:#3BE38B; animation:livepulse 2.2s infinite; }
  @keyframes livepulse{ 0%{box-shadow:0 0 0 0 rgba(59,227,139,.55)} 70%{box-shadow:0 0 0 8px rgba(59,227,139,0)} 100%{box-shadow:0 0 0 0 rgba(59,227,139,0)} }
  .leaflet-container{ background:#e8ecf1; }
  .leaflet-control-zoom{ border:0 !important; box-shadow:var(--e1) !important; border-radius:11px !important; overflow:hidden; margin:12px !important; }
  .leaflet-control-zoom a{ color:var(--navy) !important; font-weight:700; border-bottom-color:rgba(16,24,40,.06) !important; }
  .leaflet-popup-content-wrapper{ border-radius:14px; box-shadow:var(--e2); }
  .leaflet-popup-content{ font-family:var(--sans); font-size:13px; font-weight:500; margin:10px 13px; color:var(--ink); }
  .leaflet-popup-tip{ box-shadow:none; }

  .crosshair{ display:none; position:absolute; left:50%; top:50%; transform:translate(-50%,-50%); z-index:550; pointer-events:none; }
  .crosshair .ring2{ width:34px; height:34px; border:3px solid var(--navy); border-radius:50%; box-shadow:0 0 0 2px rgba(255,255,255,.9), 0 2px 6px rgba(0,0,0,.25); }
  .crosshair .dot2{ position:absolute; left:50%; top:50%; transform:translate(-50%,-50%); width:8px; height:8px; border-radius:50%; background:var(--amber); box-shadow:0 0 0 2px rgba(255,255,255,.9); }
  .pickbar{ display:none; position:absolute; left:10px; right:10px; bottom:10px; z-index:560; background:rgba(20,30,50,.92); -webkit-backdrop-filter:blur(4px); backdrop-filter:blur(4px); border-radius:14px; padding:9px 10px 9px 13px; align-items:center; justify-content:space-between; gap:10px; }
  .pickbar .pt{ color:#fff; font-size:12.5px; font-weight:600; }
  .pickbar .pbtns{ display:flex; gap:8px; flex:0 0 auto; }
  .pickbar button{ border:0; border-radius:10px; padding:8px 13px; font-weight:650; font-size:13px; cursor:pointer; font-family:var(--sans); }
  .pickbar .cancel{ background:transparent; color:#AEB6C2; padding:8px 8px; }
  .pickbar .ok{ background:var(--amber); color:#14223A; }
  .mapwrap.picking .crosshair{ display:block; }
  .mapwrap.picking .pickbar{ display:flex; }
  .mapwrap.picking .livepill{ display:none; }
  .mapwrap.picking #map{ height:60vh; }
  .tourbtn{ position:absolute; top:12px; left:52px; width:34px; height:34px; border-radius:11px; border:0; background:#22303f; color:var(--amber); font-size:16px; font-weight:700; cursor:pointer; z-index:2; transition:transform .13s var(--spring); }
  .tourbtn:active{ transform:scale(.9); }
  .app[dir=rtl] .tourbtn{ left:auto; right:52px; }
</style>
</head>

function countUp(el, to, dur){
  if(RMOTION){ el.textContent=(to>0?'+':'')+to; return; }
  const t0=performance.now();
  (function step(t){ const p=Math.min(1,(t-t0)/dur); const v=to*(1-Math.pow(1-p,3));
    el.textContent=(to>0?'+':'')+(Math.round(v*10)/10); if(p<1) requestAnimationFrame(step); })(t0);
}

function zPopup(z){ return "~"+z.couriers+" курьеров · ждут ~"+z.wait+" мин · "+z.reports+" сигн."; }
let heatRef=null, sigGroup=null;
function drawZones(){
  if(!mapInstance || typeof L==="undefined") return;
  if(heatRef){ try{mapInstance.removeLayer(heatRef);}catch(e){} heatRef=null; }
  if(sigGroup){ try{mapInstance.removeLayer(sigGroup);}catch(e){} sigGroup=null; }
  // тепловая подложка — только где скучкованы 2+ сигнала
  const clusters = (DATA.zones||[]).filter(z=>z.reports>=2);
  if(typeof L.heatLayer==="function" && clusters.length){
    heatRef = L.heatLayer(clusters.map(z=>[z.lat,z.lng,Math.max(0.35,Math.min(1,z.couriers/8))]),
      {radius:44, blur:34, maxZoom:17, minOpacity:0.35,
       gradient:{0.2:"#37b24d",0.5:"#f59f00",0.75:"#fa5252",1.0:"#e03131"}}).addTo(mapInstance);
  }
  // точные сигналы: мягкий ореол + чёткая точка (вектор — не отваливается при зуме)
  const sigs = (DATA.density||[]).filter(x=>x.lat!=null);
  const halos = sigs.map(x=>L.circleMarker([x.lat,x.lng],{radius:16,stroke:false,fillColor:densColor(x.couriers),fillOpacity:.16,interactive:false}));
  const dots = sigs.map(x=>{
    const m=L.circleMarker([x.lat,x.lng],{radius:7,color:x.mine?"#192A43":"#fff",weight:x.mine?3:2,fillColor:densColor(x.couriers),fillOpacity:1});
    m.on("click", ()=>openSignalSheet(x.id));
    return m;
  });
  sigGroup = L.layerGroup(halos.concat(dots)).addTo(mapInstance);
}
function initMap(){
  if(typeof L==="undefined") return;
  const el=document.getElementById("map"); if(!el) return;
  if(mapInstance){ try{mapInstance.remove();}catch(e){} mapInstance=null; heatRef=null; sigGroup=null; }
  const _ctr=(RT&&DATA&&DATA.center)?{lat:DATA.center.lat,lng:DATA.center.lng,zoom:12}:CITY;
  mapInstance=L.map(el,{zoomControl:true, attributionControl:false}).setView([_ctr.lat,_ctr.lng],_ctr.zoom||12);
  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{maxZoom:19}).addTo(mapInstance);
  drawZones();
  mapInstance.on("zoomend", ()=>{ if(mapInstance) drawZones(); });
  setTimeout(()=>{ if(mapInstance) mapInstance.invalidateSize(); },250);
  startPolling();
}

  const trn=e.target.closest("[data-tour]");

  if(e.target.closest("#c_agree")){ const a=document.getElementById("c_agree"); a.classList.toggle("on"); document.getElementById("c_go").disabled=!a.classList.contains("on"); return; }

function geoCity(){
  const note=$("#citynote"); if(note) note.textContent=t('ob_detecting');
  if(!navigator.geolocation){ if(note) note.textContent=t('ob_geo_fail'); return; }
  navigator.geolocation.getCurrentPosition(async pos=>{
    const lat=pos.coords.latitude, lng=pos.coords.longitude;
    try{
      const _ac=new AbortController(); const _to=setTimeout(()=>_ac.abort(),7000);
      const r=await fetch("https://nominatim.openstreetmap.org/reverse?format=json&zoom=10&accept-language=ru&lat="+lat+"&lon="+lng,{signal:_ac.signal}); clearTimeout(_to);
      const j=await r.json(); const a=j.address||{};
      const city=a.city||a.town||a.municipality||a.village||a.state||a.county||"";
      if(city) postCity(city,lat,lng); else if(note) note.textContent=t('ob_geo_fail');
    }catch(e){ if(note) note.textContent=t('ob_geo_fail'); }
  }, ()=>{ if(note) note.textContent=t('ob_geo_fail'); }, {enableHighAccuracy:true,timeout:9000});
}

  const q=DATA.queue||[];
  if(!q.length) return `<div class="card"><div class="empty">${t('q_empty')}</div></div>`;
  return `<div class="card"><div class="cardhead"><h3>${t('q_title')}</h3><span class="pct">${q.length}</span></div>`+q.map(n=>`<div class="row"><div class="ava" style="background:${avaColor(n.id)};width:38px;height:38px;font-size:14px;border-radius:12px">${n.name[0]}</div><div class="grow"><div class="nm">${esc(n.name)}</div><div class="meta">День ${n.day}/30</div></div><button class="queue-take" data-take="${n.id}">${t('take')}</button></div>`).join("")+`</div>`;
}
function renderRTTabs(){
  const tb=(id,lbl,path)=>`<button data-tab="${id}" class="${UI.tab===id?'on':''}"><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${path}</svg>${lbl}</button>`;
  const first = UI.role==="mentor"
    ? tb("home",t("t_home"),"<circle cx='9' cy='8' r='3'/><circle cx='17' cy='10' r='2.5'/><path d='M3 20c0-3 3-5 6-5s6 2 6 5'/>")
    : tb("path",t("t_path"),"<circle cx='12' cy='12' r='9'/><path d='M12 8v4l3 2'/>");
  const density=tb("density",t("t_density"),"<path d='M3 11l9-8 9 8'/><path d='M5 10v10h14V10'/>");
  const partners=tb("partners",t("t_partner"),"<circle cx='9' cy='8' r='3'/><circle cx='17' cy='10' r='2.5'/><path d='M3 20c0-3 3-5 6-5s6 2 6 5'/>");
  const profile=tb("profile",t("t_profile"),"<circle cx='12' cy='8' r='4'/><path d='M4 21c0-4 4-6 8-6s8 2 8 6'/>");
  $("#tabs").innerHTML = first+density+partners+profile;
}
function gpsBar(){ return (RT && gpsOff) ? `<div class="gpsbar"><span>${t('gps_hint')}</span><button data-gps-x>×</button></div>` : ""; }
function navFade(){ const _sc=$("#screen"); if(UI._nav){ _sc.scrollTop=0; _sc.classList.remove("nav-in"); void _sc.offsetWidth; _sc.classList.add("nav-in"); UI._nav=false; } }
function renderRT(){
  const tabs=$("#tabs");
  if(DEMO) updateSeg();
  if(DEMO && UI.role==="partner"){ tabs.style.display="none"; $("#screen").innerHTML=viewBusiness(); navFade(); return; }
  if(DATA.needs==="role"){ tabs.style.display="none"; $("#screen").innerHTML=viewOnboardRole(); navFade(); return; }
  if(DATA.needs==="city"){ tabs.style.display="none"; $("#screen").innerHTML=viewOnboardCity(); navFade(); return; }
  UI.role = DATA.me.role;
  if(DEMO) updateSeg();
  const valid = UI.role==="mentor" ? ["home","density","partners","profile"] : ["path","density","partners","profile"];
  if(!valid.includes(UI.tab)) UI.tab=valid[0];
  tabs.style.display="flex"; renderRTTabs();
  let html;
  if(UI.tab==="profile") html=viewProfile();
  else if(UI.tab==="density") html=tabDensity();
  else if(UI.tab==="partners") html=tabPartners();
  else if(UI.role==="mentor") html=viewMentor();
  else html=viewNewbie();
  if(UI.tab!=="profile") html = gpsBar() + html;
  $("#screen").innerHTML = html;
  if(UI.tab==="path") enhanceHero();
  if(UI.tab==="density") initMap();
  navFade();
}

(async function(){ initTg();
  document.getElementById("app").setAttribute("dir", LANG==="ar"?"rtl":"ltr");
  let cfg={showcase:true};
  try{ cfg = await api("/api/config"); }catch(e){}
  DEMO = !!cfg.showcase; RT = true;
  if(!DEMO){ const _l=document.querySelector(".rolebar .lbl"); if(_l) _l.style.display="none"; const _sg=$("#seg"); if(_sg) _sg.style.display="none"; }
  checkGps();
  try{ await loadApp(); }
  catch(e){ $("#screen").innerHTML='<div class="empty" style="padding-top:40px">Не удалось связаться с сервером.<br>Проверьте соединение и обновите страницу.</div>'; return; }
  try{ applyStaticI18n(); render(); track("open"); }
  catch(e){ console.error("render error", e); }
  if(!consented()) showConsent();
  else maybeTour();
})();
</script>
</body>
